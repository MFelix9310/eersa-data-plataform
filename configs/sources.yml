      - S.N.I.        # Cols O-P: KW, KWh (solo 2 métricas)
    agregados:
      - TOTAL EERSA              # Cols T-U: KW, KW-H
      - ENERGIA ENTREGADA AL MEM # Col V
      - ENERGIA RECIBIDA DEL MEM # Col W
    archivos:
