# Fuentes de datos EERSA - Generación 2021
# Cada entrada describe un archivo fuente con sus metadatos

sources:
  eersa_generacion_2021:
    description: "Resúmenes mensuales de generación eléctrica EERSA 2021"
    owner: "EERSA - Empresa Eléctrica Riobamba S.A."
    frecuencia: mensual
    formato: xlsx
    hoja: "RESUMEN"
    header_rows: [9, 10]  # Headers en filas 9-10 (1-indexed)
    data_start_row: 11
    year: 2021
    plantas:
      - ALAO          # Cols C-F: KW, E.Bruta kWh, C.Int kWh, E.Neta kWh
